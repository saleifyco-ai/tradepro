<!DOCTYPE html><html><body>
<h2>Login</h2>
<input id="email"><input id="password" type="password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyDWmnDwQr-YX1IG-WmfCYL4AqALil14h3g",authDomain:"tradepro-a2779.firebaseapp.com",projectId:"tradepro-a2779"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

window.signup=async()=>{
let u=await createUserWithEmailAndPassword(auth,email.value,password.value);
await setDoc(doc(db,"users",u.user.uid),{balance:10000});
alert("ok");
}

window.login=async()=>{
await signInWithEmailAndPassword(auth,email.value,password.value);
location="dashboard.html";
}
</script>
</body></html>
